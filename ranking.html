<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking - BeLTA Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #8e44ad, #3498db);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #000;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Filtros de Jogos */
        .game-filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .game-filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .game-filter-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .game-filter-btn.active {
            background: #f1c40f;
            color: #2c3e50;
            border-color: #f1c40f;
            font-weight: bold;
        }

        /* Grid de Rankings */
        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .ranking-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
            color: #2c3e50;
        }

        .ranking-card:hover {
            transform: translateY(-5px);
        }

        .ranking-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 3px solid #f1c40f;
        }

        .game-icon {
            font-size: 2.5rem;
        }

        .game-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .ranking-list {
            list-style: none;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .ranking-item:hover {
            background: #e9ecef;
        }

        .position {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3498db;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .position-1 {
            background: #f1c40f;
            color: #2c3e50;
        }

        .position-2 {
            background: #95a5a6;
        }

        .position-3 {
            background: #e67e22;
        }

        .player-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .player-photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            border: 2px solid #3498db;
        }

        .player-score {
            font-weight: bold;
            color: #27ae60;
            font-size: 1.2rem;
        }

        .empty-ranking {
            text-align: center;
            padding: 40px 20px;
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .empty-ranking i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Botões de Navegação */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 30px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover {
            background: #219653;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn-secondary {
            background: #34495e;
        }

        .nav-btn-secondary:hover {
            background: #2c3e50;
        }

        /* Loading Spinner */
        .loading-spinner {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsivo */
        @media (max-width: 768px) {
            .rankings-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .game-filters {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: 10px;
            }
            
            .game-filter-btn {
                flex-shrink: 0;
            }
        }

        /* Data do Ranking */
        .ranking-date {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* Estrelas para os melhores */
        .stars {
            color: #f1c40f;
            font-size: 1.2rem;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <div class="header">
            <h1>🏆 Ranking BeLTA Games</h1>
            <p>Os melhores jogadores de cada jogo educativo</p>
        </div>

        <!-- Filtros por Jogo -->
        <div class="game-filters">
            <button class="game-filter-btn active" data-game="todos">
                <span>🌍</span> Todos os Jogos
            </button>
            <button class="game-filter-btn" data-game="Tabuada Ninja">
                <span>🥷</span> Tabuada Ninja
            </button>
            <button class="game-filter-btn" data-game="Mapa do Brasil">
                <span>🗺️</span> Mapa do Brasil
            </button>
            <button class="game-filter-btn" data-game="Memória Capitais">
                <span>🃏</span> Memória Capitais
            </button>
            <button class="game-filter-btn" data-game="Desafio Palavras">
                <span>🚀</span> Desafio Palavras
            </button>
            <button class="game-filter-btn" data-game="Puzzle 15">
                <span>🧩</span> Puzzle 15
            </button>
            <button class="game-filter-btn" data-game="Quiz Educativo">
                <span>🧠</span> Quiz Educativo
            </button>
        </div>

        <!-- Grid de Rankings -->
        <div id="rankings-container" class="rankings-grid">
            <!-- Os rankings serão carregados aqui via JavaScript -->
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Carregando rankings...</p>
            </div>
        </div>

        <!-- Navegação -->
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn nav-btn-secondary">
                <span>🏠</span> Voltar ao Portal
            </a>
            <button id="btn-refresh" class="nav-btn">
                <span>🔄</span> Atualizar Rankings
            </button>
        </div>
    </div>

    <!-- Import Firebase Config -->
    <script type="module" src="firebase-config.js"></script>

    <script>
        // Mapeamento de jogos para ícones
        const GAME_CONFIG = {
            'Tabuada Ninja': { icon: '🥷', color: '#e74c3c' },
            'Mapa do Brasil': { icon: '🗺️', color: '#3498db' },
            'Memória Capitais': { icon: '🃏', color: '#9b59b6' },
            'Desafio Palavras': { icon: '🚀', color: '#e67e22' },
            'Puzzle 15': { icon: '🧩', color: '#1abc9c' },
            'Quiz Educativo': { icon: '🧠', color: '#f1c40f' }
        };

        // Dicionário de jogos para carregar
        const GAMES_LIST = [
            'Tabuada Ninja',
            'Mapa do Brasil', 
            'Memória Capitais',
            'Desafio Palavras',
            'Puzzle 15',
            'Quiz Educativo'
        ];

        // Estado atual
        let currentFilter = 'todos';
        let allRankings = {};

        // Inicialização
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Iniciando página de ranking...');
            
            // Configura filtros
            setupFilters();
            
            // Carrega todos os rankings
            await loadAllRankings();
            
            // Configura botão de atualizar
            document.getElementById('btn-refresh').addEventListener('click', async () => {
                await loadAllRankings();
                showNotification('Rankings atualizados!');
            });
        });

        // Configura os botões de filtro
        function setupFilters() {
            const filterButtons = document.querySelectorAll('.game-filter-btn');
            
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Remove classe ativa de todos
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // Adiciona classe ativa ao clicado
                    button.classList.add('active');
                    
                    // Atualiza filtro
                    currentFilter = button.dataset.game;
                    
                    // Atualiza exibição
                    displayRankings();
                });
            });
        }

        // Carrega todos os rankings do Firebase
        async function loadAllRankings() {
            const container = document.getElementById('rankings-container');
            container.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Carregando rankings...</p>
                </div>
            `;
            
            try {
                // Para cada jogo, busca o ranking
                for (const gameName of GAMES_LIST) {
                    console.log(`📊 Carregando ranking: ${gameName}`);
                    
                    // Usa a função do firebase-config.js
                    const rankingData = await window.obterRanking(gameName);
                    
                    // Armazena no objeto global
                    allRankings[gameName] = rankingData || [];
                }
                
                console.log('✅ Todos os rankings carregados:', allRankings);
                displayRankings();
                
            } catch (error) {
                console.error('❌ Erro ao carregar rankings:', error);
                container.innerHTML = `
                    <div class="empty-ranking">
                        <div style="font-size: 3rem;">😕</div>
                        <h3>Erro ao carregar rankings</h3>
                        <p>${error.message}</p>
                        <p>Tente recarregar a página ou verificar sua conexão.</p>
                    </div>
                `;
            }
        }

        // Exibe os rankings com base no filtro atual
        function displayRankings() {
            const container = document.getElementById('rankings-container');
            
            if (currentFilter === 'todos') {
                // Mostra todos os jogos
                container.innerHTML = '';
                
                GAMES_LIST.forEach(gameName => {
                    const rankingData = allRankings[gameName] || [];
                    if (rankingData.length > 0) {
                        container.appendChild(createRankingCard(gameName, rankingData));
                    }
                });
                
                // Se nenhum ranking tiver dados
                if (container.innerHTML === '') {
                    container.innerHTML = createEmptyState();
                }
                
            } else {
                // Mostra apenas o jogo selecionado
                const rankingData = allRankings[currentFilter] || [];
                container.innerHTML = '';
                
                if (rankingData.length > 0) {
                    container.appendChild(createRankingCard(currentFilter, rankingData));
                } else {
                    container.innerHTML = createEmptyState(currentFilter);
                }
            }
        }

        // Cria um card de ranking para um jogo específico
        function createRankingCard(gameName, rankingData) {
            const config = GAME_CONFIG[gameName] || { icon: '🎮', color: '#95a5a6' };
            
            const card = document.createElement('div');
            card.className = 'ranking-card';
            card.style.borderTop = `5px solid ${config.color}`;
            
            let playersHTML = '';
            
            rankingData.forEach((player, index) => {
                const positionClass = `position position-${index + 1}`;
                const stars = index < 3 ? '<span class="stars">⭐</span>' : '';
                
                playersHTML += `
                    <li class="ranking-item">
                        <div class="${positionClass}">
                            ${index + 1}
                        </div>
                        <img src="${player.foto || 'https://via.placeholder.com/40'}" 
                             alt="${player.nickname}" 
                             class="player-photo"
                             onerror="this.src='https://via.placeholder.com/40'">
                        <div class="player-info">
                            <span class="player-name">
                                ${player.nickname} ${stars}
                            </span>
                            <span class="ranking-date">
                                ${formatDate(player.data)}
                            </span>
                        </div>
                        <div class="player-score">
                            ${player.pontos} pts
                        </div>
                    </li>
                `;
            });
            
            card.innerHTML = `
                <div class="ranking-header">
                    <div>
                        <div class="game-title">${gameName}</div>
                        <div class="ranking-date">
                            ${rankingData.length} jogadores no ranking
                        </div>
                    </div>
                    <div class="game-icon">${config.icon}</div>
                </div>
                
                ${rankingData.length > 0 ? `
                    <ul class="ranking-list">
                        ${playersHTML}
                    </ul>
                ` : `
                    <div class="empty-ranking">
                        <div style="font-size: 3rem;">📭</div>
                        <h3>Nenhuma pontuação ainda</h3>
                        <p>Seja o primeiro a jogar ${gameName}!</p>
                    </div>
                `}
            `;
            
            return card;
        }

        // Cria estado vazio
        function createEmptyState(gameName = null) {
            const gameText = gameName ? ` para ${gameName}` : '';
            
            return `
                <div class="empty-ranking">
                    <div style="font-size: 3rem;">🏆</div>
                    <h3>Nenhum ranking disponível${gameText}</h3>
                    <p>Os jogadores ainda não enviaram pontuações.</p>
                    <p>Volte ao portal e seja o primeiro!</p>
                </div>
            `;
        }

        // Formata data
        function formatDate(dateString) {
            if (!dateString) return 'Data desconhecida';
            
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                return 'Hoje';
            } else if (diffDays === 1) {
                return 'Ontem';
            } else if (diffDays < 7) {
                return `Há ${diffDays} dias`;
            } else {
                return date.toLocaleDateString('pt-BR');
            }
        }

        // Mostra notificação
        function showNotification(message) {
            // Cria elemento de notificação
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #27ae60;
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // Remove após 3 segundos
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Adiciona animação CSS para notificação
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
   // Atualização automática a cada 30 segundos
let autoRefreshInterval = setInterval(async () => {
    console.log('🔄 Atualização automática do ranking...');
    await loadAllRankings();
}, 30000);

// Limpar intervalo quando a página for fechada
window.addEventListener('beforeunload', () => {
    clearInterval(autoRefreshInterval);
});
    </script>
    </body>
</html>
