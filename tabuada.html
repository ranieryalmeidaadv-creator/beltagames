<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada Ninja - BeLTA Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: #1a1a1a; 
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; 
            cursor: crosshair;
        }

        .header { text-align: center; margin-top: 15px; z-index: 10; }
        h1 { font-size: 2.8rem; color: #e74c3c; text-shadow: 2px 2px 0 #f1c40f; margin-bottom: 5px; }
        p { color: #f1c40f; font-weight: bold; }

        #game-wrapper {
            width: 100%;
            max-width: 800px;
            height: 75vh;
            position: relative;
            background: #2c3e50;
            border: 6px solid #34495e;
            border-radius: 25px;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .question-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(231, 76, 60, 0.95);
            padding: 15px 45px;
            border-radius: 50px;
            font-size: 2.8rem;
            font-weight: bold;
            z-index: 100;
            border: 4px solid #f1c40f;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-top: 10px;
            font-size: 1.6rem;
            font-weight: bold;
        }
        .score { color: #2ecc71; }
        .lives { color: #e74c3c; }

        .balloon {
            position: absolute;
            width: 85px;
            height: 105px;
            background: #3498db;
            border-radius: 50% 50% 50% 50% / 45% 45% 55% 55%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: inset -6px -6px 12px rgba(0,0,0,0.2);
            animation: floatUp linear forwards;
            user-select: none;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -18px;
            width: 2px;
            height: 25px;
            background: rgba(255,255,255,0.4);
        }

        @keyframes floatUp {
            from { transform: translateY(80vh); }
            to { transform: translateY(-25vh); }
        }

        .pop { animation: popOut 0.25s ease-out forwards; pointer-events: none; }
        @keyframes popOut { to { transform: scale(1.8); opacity: 0; } }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            text-align: center;
            padding: 20px;
        }
        .btn {
            padding: 15px 45px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }
        .btn-start { background: #e74c3c; color: white; }
        .btn-menu { background: #34495e; color: white; text-decoration: none; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🥷 Tabuada Ninja</h1>
        <p>Mostre que você é um mestre da matemática!</p>
    </div>

    <div class="stats">
        <span class="score">Pontos: <span id="score-val">0</span></span>
        <span class="lives">Vidas: <span id="lives-val">❤️❤️❤️</span></span>
    </div>

    <div id="game-wrapper">
        <div class="question-box" id="question">Pronto?</div>
        
        <div class="overlay" id="start-screen">
            <h2 style="color: #f1c40f; margin-bottom: 20px; font-size: 2rem;">Inicie seu Treinamento Ninja</h2>
            <p style="color: white; margin-bottom: 30px; font-size: 1.1rem; max-width: 400px;">
                Acerte os balões com os resultados corretos. <br>
                A velocidade aumentará conforme você evolui!
            </p>
            <button class="btn btn-start" onclick="startGame()">Começar Missão</button>
            <a href="index.html" class="btn btn-menu">Voltar ao Menu</a>
        </div>
    </div>

    <script>
        let score = 0;
        let lives = 3;
        let gameActive = false;
        let currentAnswer = 0;
        
        // VELOCIDADE INICIAL: 12 segundos (bem lento)
        const startDuration = 12; 
        const minDuration = 2.5; // Limite máximo de velocidade (muito rápido)
        const speedIncrement = 0.08; // Quanto reduz por ponto (0.08s a menos por ponto)

        let spawnInterval;
        const wrapper = document.getElementById('game-wrapper');
        const questionEl = document.getElementById('question');
        const scoreEl = document.getElementById('score-val');
        const livesEl = document.getElementById('lives-val');
        const startScreen = document.getElementById('start-screen');

        function startGame() {
            score = 0;
            lives = 3;
            gameActive = true;
            startScreen.style.display = 'none';
            updateStats();
            nextQuestion();
            
            if(spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnBalloons, 2200);
        }

        function nextQuestion() {
            const n1 = Math.floor(Math.random() * 9) + 2; 
            const n2 = Math.floor(Math.random() * 9) + 2; 
            currentAnswer = n1 * n2;
            questionEl.textContent = `${n1} x ${n2}`;
        }

        function spawnBalloons() {
            if (!gameActive) return;

            const answers = [currentAnswer];
            while(answers.length < 3) {
                let wrong = (Math.floor(Math.random() * 80) + 4);
                if(!answers.includes(wrong) && wrong !== currentAnswer) answers.push(wrong);
            }

            answers.sort(() => Math.random() - 0.5);

            answers.forEach((val, index) => {
                setTimeout(() => {
                    if(gameActive) createBalloon(val);
                }, index * 700); 
            });
        }

        function createBalloon(val) {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.textContent = val;
            
            const pos = Math.floor(Math.random() * (wrapper.offsetWidth - 100));
            b.style.left = pos + 'px';
            
            // CÁLCULO DE VELOCIDADE GRADUAL:
            // Começa em 12s e diminui 0.08s para cada ponto feito.
            const currentDuration = Math.max(minDuration, startDuration - (score * speedIncrement));
            b.style.animationDuration = currentDuration + 's';

            const colors = ['#3498db', '#e67e22', '#9b59b6', '#f1c40f', '#1abc9c', '#e74c3c'];
            b.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

            b.onclick = () => handleBalloonClick(b, val);

            b.addEventListener('animationend', () => {
                if (val === currentAnswer && b.parentElement && !b.classList.contains('pop')) {
                    loseLife();
                }
                if(b.parentElement) b.remove();
            });

            wrapper.appendChild(b);
        }

        function handleBalloonClick(balloon, val) {
            if (!gameActive || balloon.classList.contains('pop')) return;

            if (val === currentAnswer) {
                score++;
                balloon.classList.add('pop');
                setTimeout(() => balloon.remove(), 250);
                nextQuestion();
            } else {
                balloon.style.backgroundColor = '#000';
                loseLife();
                balloon.classList.add('pop');
                setTimeout(() => balloon.remove(), 250);
            }
            updateStats();
        }

        function loseLife() {
            lives--;
            updateStats();
            if (lives <= 0) gameOver();
        }

        function updateStats() {
            scoreEl.textContent = score;
            livesEl.textContent = "❤️".repeat(Math.max(0, lives));
        }

        function gameOver() {
            gameActive = false;
            clearInterval(spawnInterval);
            
            const balloons = document.querySelectorAll('.balloon');
            balloons.forEach(b => b.remove());

            startScreen.style.display = 'flex';
            startScreen.innerHTML = `
                <h2 style="color: #e74c3c; font-size: 2.5rem; margin-bottom: 10px;">TREINO FINALIZADO</h2>
                <p style="font-size: 1.4rem; color: white; margin-bottom: 20px;">Você alcançou o nível de <b>${score} pontos</b>!</p>
                <button class="btn btn-start" onclick="location.reload()">Recomeçar Treino</button>
                <a href="index.html" class="btn btn-menu">Menu Principal</a>
            `;
        }
    </script>
</body>
</html>
