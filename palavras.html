<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio das Palavras - BeLTA Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #2c3e50;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 15px; color: white; }
        h1 { font-size: 2.5rem; text-shadow: 3px 3px 0 rgba(0,0,0,0.3); color: #f1c40f; }

        #game-container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            width: 100%;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 2px solid #eee;
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #2575fc; display: block; }

        .play-area {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Área Visual dos Balões */
        .visual-area {
            width: 220px;
            height: 250px;
            position: relative;
            background: #eef2f3;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            width: 40px;
            height: 50px;
            border-radius: 50%;
            transition: all 0.5s ease;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 18px;
            width: 2px;
            height: 40px;
            background: rgba(0,0,0,0.2);
        }

        .astronaut { font-size: 60px; z-index: 10; transition: 0.5s; }

        /* Área da Palavra */
        .word-section { text-align: center; flex: 1; min-width: 280px; }
        .hint-box { background: #e3f2fd; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #bbdefb; color: #1565c0; font-weight: bold; }
        .word-display { font-size: 2.5rem; letter-spacing: 10px; font-weight: bold; color: #34495e; margin-bottom: 20px; text-transform: uppercase; }

        /* Teclado */
        .keyboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 650px; }
        .key {
            width: 45px; height: 50px; background: #eee; border: none; border-radius: 10px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        .key:hover { background: #ddd; transform: scale(1.1); }
        .key.correct { background: #2ecc71 !important; color: white; }
        .key.wrong { background: #95a5a6 !important; color: white; opacity: 0.4; }
        .key:disabled { cursor: default; transform: none; }

        /* Botões */
        .controls { margin-top: 25px; display: flex; gap: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; text-decoration: none; transition: 0.3s; }
        .btn-reset { background: #f1c40f; color: #333; }
        .btn-menu { background: #34495e; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 Desafio das Palavras</h1>
        <p>Acerte as letras para manter os balões flutuando!</p>
    </div>

    <div id="game-container">
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-value" id="points">0</span><span class="stat-label">Pontos</span></div>
            <div class="stat-item"><span class="stat-value" id="timer">00:00</span><span class="stat-label">Tempo</span></div>
        </div>

        <div class="play-area">
            <div class="visual-area" id="visual-area">
                <!-- Balões serão gerados aqui -->
                <div class="astronaut" id="astronaut">👨‍🚀</div>
            </div>

            <div class="word-section">
                <div class="hint-box">Dica: <span id="hint-text">...</span></div>
                <div class="word-display" id="word-display">_ _ _ _</div>
            </div>
        </div>

        <div class="keyboard" id="keyboard"></div>

        <div class="controls">
            <button class="btn btn-reset" onclick="initGame()">🔄 Nova Palavra</button>
            <a href="index.html" class="btn btn-menu">🏠 Menu Principal</a>
        </div>
    </div>

    <script>
        const wordList = [
            {w: "FOTOSSINTESE", h: "Processo das plantas para produzir energia usando a luz solar."},
            {w: "MAMIFERO", h: "Animal que mama quando filhote."},
            {w: "ATMOSFERA", h: "Camada de ar que envolve a Terra."},
            {w: "ESQUELETO", h: "Conjunto de ossos do nosso corpo."},
            {w: "GRAVIDADE", h: "Força que puxa tudo para o centro da Terra."},
            {w: "PLANETA", h: "Corpo celeste que orbita uma estrela, como a Terra."},
            {w: "CONTINENTE", h: "Grande massa de terra cercada por oceanos."},
            {w: "MULTIPLICACAO", h: "Operação matemática de somar várias vezes o mesmo número."},
            {w: "DIVISAO", h: "Operação de repartir algo em partes iguais."},
            {w: "SUBSTANTIVO", h: "Classe de palavra que dá nome aos seres e objetos."},
            {w: "REPUBLICA", h: "Forma de governo onde o povo elege o presidente."},
            {w: "RECICLAGEM", h: "Transformar lixo em algo novo."},
            {w: "ASTRONAUTA", h: "Pessoa que viaja para o espaço."},
            {w: "EQUADOR", h: "Linha imaginária que divide a Terra em Norte e Sul."},
            {w: "DICIONARIO", h: "Livro que explica o significado das palavras."},
            {w: "TRIANGULO", h: "Forma geométrica de três lados."},
            {w: "HIDROGRAFIA", h: "Estudo das águas do planeta."},
            {w: "SINONIMO", h: "Palavra com significado parecido."},
            {w: "ANTONIMO", h: "Palavra com significado oposto."},
            {w: "AMAZONIA", h: "A maior floresta tropical do mundo."}
            // ... (Você pode adicionar as outras 80 palavras aqui seguindo este padrão)
        ];

        let selectedWord = "", selectedHint = "";
        let guessedLetters = [], wrongGuesses = 0, points = 0;
        let timerSeconds = 0, timerInterval;
        const maxChances = 6;
        const balloonColors = ['#FF5252', '#FF4081', '#E040FB', '#7C4DFF', '#536DFE', '#448AFF'];

        function initGame() {
            const randomObj = wordList[Math.floor(Math.random() * wordList.length)];
            selectedWord = randomObj.w.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
            selectedHint = randomObj.h;
            guessedLetters = [];
            wrongGuesses = 0;
            
            document.getElementById('hint-text').textContent = selectedHint;
            document.getElementById('keyboard').innerHTML = '';
            document.getElementById('astronaut').style.transform = 'translateY(0)';
            
            createBalloons();
            createKeyboard();
            updateDisplay();
            
            if (!timerInterval) startTimer();
        }

        function createBalloons() {
            const area = document.getElementById('visual-area');
            // Limpa balões antigos mantendo o astronauta
            const oldBalloons = area.querySelectorAll('.balloon');
            oldBalloons.forEach(b => b.remove());

            for (let i = 0; i < maxChances; i++) {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.id = `balloon-${i}`;
                b.style.backgroundColor = balloonColors[i];
                b.style.left = (20 + (i * 30)) + 'px';
                b.style.top = (20 + (i % 2 * 20)) + 'px';
                area.appendChild(b);
            }
        }

        function createKeyboard() {
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const kb = document.getElementById('keyboard');
            letters.split('').forEach(l => {
                const btn = document.createElement('button');
                btn.textContent = l;
                btn.className = 'key';
                btn.onclick = () => handleGuess(l, btn);
                kb.appendChild(btn);
            });
        }

        function handleGuess(letter, btn) {
            btn.disabled = true;
            if (selectedWord.includes(letter)) {
                guessedLetters.push(letter);
                btn.classList.add('correct');
                updateDisplay();
                checkWin();
            } else {
                wrongGuesses++;
                btn.classList.add('wrong');
                popBalloon();
                checkLose();
            }
        }

        function popBalloon() {
            const balloon = document.getElementById(`balloon-${maxChances - wrongGuesses}`);
            if (balloon) {
                balloon.style.transform = 'scale(0)';
                balloon.style.opacity = '0';
            }
            // O astronauta desce um pouco
            document.getElementById('astronaut').style.transform = `translateY(${wrongGuesses * 15}px)`;
        }

        function updateDisplay() {
            const display = selectedWord.split('').map(l => 
                guessedLetters.includes(l) ? l : "_"
            ).join(" ");
            document.getElementById('word-display').textContent = display;
        }

        function checkWin() {
            const currentDisplay = document.getElementById('word-display').textContent.replace(/\s/g, '');
            if (currentDisplay === selectedWord) {
                points += 10;
                document.getElementById('points').textContent = points;
                setTimeout(() => {
                    alert("🌟 EXCELENTE! Você salvou o astronauta!");
                    initGame();
                }, 300);
            }
        }

        function checkLose() {
            if (wrongGuesses >= maxChances) {
                document.getElementById('astronaut').style.transform = 'translateY(100px)';
                setTimeout(() => {
                    alert("🎈 Ops! Todos os balões estouraram.\nA palavra era: " + selectedWord);
                    initGame();
                }, 300);
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timerSeconds++;
                const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const s = (timerSeconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${m}:${s}`;
            }, 1000);
        }

        window.onload = initGame;
    </script>
</body>
</html>
