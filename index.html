<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Arcade Kids</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(135deg, #8e44ad, #3498db);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.8rem; margin-bottom: 10px; text-shadow: 3px 3px 0 #333; color: #f1c40f; }
        
        .game-menu { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .game-btn {
            padding: 18px 35px;
            font-size: 1.3rem;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            background: linear-gradient(145deg, #f1c40f, #f39c12);
            color: #d35400;
            transition: all 0.3s ease;
        }
        .game-btn:hover { transform: translateY(-5px); }
        
        #game-container {
            background: white;
            color: #2c3e50;
            padding: 30px;
            border-radius: 25px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            min-height: 500px;
        }
        
        /* Puzzle 15 */
        .puzzle-stats { display: flex; justify-content: space-around; background: #ecf0f1; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .board-15 { display: grid; grid-template-columns: repeat(4, 90px); grid-template-rows: repeat(4, 90px); gap: 8px; background: #34495e; padding: 10px; border-radius: 12px; margin: 0 auto 25px; }
        .tile-15 {
            width: 90px; height: 90px;
            background: linear-gradient(145deg, #3498db, #2980b9);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            border-radius: 10px;
            user-select: none;
            transition: all 0.2s ease;
        }
        .tile-15.empty { background: transparent; cursor: default; }
        .tile-15:not(.empty):hover { background: linear-gradient(145deg, #1abc9c, #16a085); transform: scale(1.05); }
        
        /* Quiz */
        .quiz-stats { display: flex; justify-content: space-between; background: #ecf0f1; padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .quiz-question { font-size: 1.8rem; margin-bottom: 30px; color: #2c3e50; line-height: 1.4; }
        .quiz-options { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 30px; }
        .quiz-btn-option {
            padding: 20px;
            font-size: 1.4rem;
            background: linear-gradient(145deg, #27ae60, #219653);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .quiz-btn-option:hover { transform: translateY(-3px); }
        
        .control-btn { padding: 15px 30px; font-size: 1.2rem; background: #e74c3c; color: white; border: none; border-radius: 12px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>

        <h1>🎮 Super Arcade Kids</h1>

    </div>

        <button class="game-btn" onclick="loadGame('puzzle')">🧩 Puzzle 15</button>

            // PORTUGUÊS (20 perguntas)

        // ============== QUIZ FUNCIONAL ==============
        let quizScore = 0, currentQuestionIndex = 0, selectedQuestions = [];
        
        function startQuiz() {
            // Seleciona 10 perguntas aleatórias SEM REPETIR do banco de 100+
            selectedQuestions = [];
            const tempQuestions = [...questionBank];
            
            // Embaralha usando Fisher-Yates
            for (let i = tempQuestions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tempQuestions[i], tempQuestions[j]] = [tempQuestions[j], tempQuestions[i]];
            }
            
            // Pega as primeiras 10
            selectedQuestions = tempQuestions.slice(0, 10);
            
            quizScore = 0;
            currentQuestionIndex = 0;
            renderQuiz();
        }
        
        function renderQuiz() {
            if (currentQuestionIndex >= selectedQuestions.length) {
                showQuizResult();
                return;
            }
            
            const question = selectedQuestions[currentQuestionIndex];
            gameContent.innerHTML = `
                <h2>🧠 Quiz Educativo</h2>
                <div class="quiz-stats">
                    <div>Pergunta ${currentQuestionIndex + 1} de 10</div>
                    <div>Pontos: ${quizScore}</div>
                </div>
                <div class="quiz-question">${question.q}</div>
                <div class="quiz-options" id="quiz-options"></div>
                <button class="control-btn" onclick="startQuiz()">🔄 Novo Jogo</button>
            `;
            
            const optionsContainer = document.getElementById('quiz-options');
            // Embaralha as opções de resposta
            const shuffledOptions = [...question.a].sort(() => Math.random() - 0.5);
            
            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                button.className = 'quiz-btn-option';
                button.textContent = option;
                button.onclick = () => {
                    if (option === question.c) {
                        quizScore++;
                        button.style.background = 'linear-gradient(145deg, #2ecc71, #27ae60)';
                    } else {
                        button.style.background = 'linear-gradient(145deg, #e74c3c, #c0392b)';
                    }
                    
                    // Desabilita todos os botões após resposta
                    document.querySelectorAll('.quiz-btn-option').forEach(btn => {
                        btn.disabled = true;
                        if (btn.textContent === question.c) {
                            btn.style.background = 'linear-gradient(145deg, #2ecc71, #27ae60)';
                        }
                    });
                    
                    setTimeout(() => {
                        currentQuestionIndex++;
                        renderQuiz();
                    }, 1500);
                };
                optionsContainer.appendChild(button);
            });
        }
        
        function showQuizResult() {
            let message = '';
            if (quizScore === 10) message = '🎉 PERFEITO! Você é um gênio!';
            else if (quizScore >= 8) message = '👏 EXCELENTE! Muito inteligente!';
            else if (quizScore >= 6) message = '👍 MUITO BOM! Continue estudando!';
            else if (quizScore >= 4) message = '💪 FOI BEM! Pode melhorar ainda mais!';
            else message = '😊 TENTE NOVAMENTE! Você vai conseguir!';
            
            gameContent.innerHTML = `
                <div style="text-align: center; padding: 30px;">
                    <h2>Quiz Concluído!</h2>
                    <div style="font-size: 4rem; color: #e74c3c; margin: 20px 0;">${quizScore}/10</div>
                    <div style="font-size: 1.5rem; color: #7f8c8d; margin-bottom: 30px;">${message}</div>
                    <button class="control-btn" onclick="startQuiz()">🔄 Jogar Novamente</button>
                    <button class="control-btn" onclick="loadGame('menu')">🏠 Voltar ao Menu</button>
                </div>
            `;
        }
        
        // ============== PUZZLE 15 CORRIGIDO ==============
        let puzzleBoard = [];
        let emptyIndex = 15; // Posição da peça vazia (0-15)
        let movesCount = 0;
        let timerSeconds = 0;
        let timerInterval = null;
        
        function startPuzzle() {
            // Inicializa o tabuleiro ordenado
            puzzleBoard = [];
            for (let i = 1; i <= 15; i++) puzzleBoard.push(i);
            puzzleBoard.push(null);
            
            movesCount = 0;
            timerSeconds = 0;
            emptyIndex = 15;
            
            // Embaralha corretamente
            shufflePuzzle();
            
            // Timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds++;
                updatePuzzleDisplay();
            }, 1000);
            
            renderPuzzle();
        }
        
        function shufflePuzzle() {
            // Faz 300 movimentos válidos para embaralhar
            for (let i = 0; i < 300; i++) {
                const adjacent = getAdjacentPositions(emptyIndex);
                const randomMove = adjacent[Math.floor(Math.random() * adjacent.length)];
                swapTiles(randomMove, emptyIndex);
                emptyIndex = randomMove;
            }
            movesCount = 0;
        }
        
        function renderPuzzle() {
            gameContent.innerHTML = `
                <h2>🧩 Puzzle 15</h2>
                <div class="puzzle-stats">
                    <div>
                        <div style="font-size: 2.2rem; font-weight: bold;">${movesCount}</div>
                        <div>Movimentos</div>
                    </div>
                    <div>
                        <div style="font-size: 2.2rem; font-weight: bold;" id="timer-display">00:00</div>
                        <div>Tempo</div>
                    </div>
                </div>
                <div class="board-15" id="puzzle-board"></div>
                <div>
                    <button class="control-btn" onclick="shufflePuzzle()">🔀 Embaralhar</button>
                    <button class="control-btn" onclick="startPuzzle()">🔄 Reiniciar</button>
                    <button class="control-btn" onclick="loadGame('menu')">🏠 Menu</button>
                </div>
            `;
            
            createPuzzleTiles();
            updatePuzzleDisplay();
        }
        
        function createPuzzleTiles() {
            const board = document.getElementById('puzzle-board');
            board.innerHTML = '';
            
            puzzleBoard.forEach((value, index) => {
                const tile = document.createElement('div');
                tile.className = value === null ? 'tile-15 empty' : 'tile-15';
                tile.textContent = value || '';
                tile.onclick = () => handleTileClick(index);
                board.appendChild(tile);
            });
        }
        
        function handleTileClick(clickedIndex) {
            // Verifica se a peça clicada é adjacente à vazia
            if (isAdjacent(clickedIndex, emptyIndex)) {
                swapTiles(clickedIndex, emptyIndex);
                emptyIndex = clickedIndex;
                movesCount++;
                
                createPuzzleTiles();
                updatePuzzleDisplay();
                
                // Verifica vitória
                if (checkPuzzleWin()) {
                    clearInterval(timerInterval);
                    setTimeout(() => {
                        alert(`🎉 Parabéns! Você completou em ${movesCount} movimentos e ${formatTime(timerSeconds)}!`);
                    }, 300);
                }
            }
        }
        
        function isAdjacent(index1, index2) {
            const row1 = Math.floor(index1 / 4);
            const col1 = index1 % 4;
            const row2 = Math.floor(index2 / 4);
            const col2 = index2 % 4;
            
            // Mesma linha e coluna adjacente OU mesma coluna e linha adjacente
            return (row1 === row2 && Math.abs(col1 - col2) === 1) ||
                   (col1 === col2 && Math.abs(row1 - row2) === 1);
        }
        
        function getAdjacentPositions(position) {
            const adjacent = [];
            const row = Math.floor(position / 4);
            const col = position % 4;
            
            if (row > 0) adjacent.push(position - 4); // Cima
            if (row < 3) adjacent.push(position + 4); // Baixo
            if (col > 0) adjacent.push(position - 1); // Esquerda
            if (col < 3) adjacent.push(position + 1); // Direita
            
            return adjacent;
        }
        
        function swapTiles(index1, index2) {
            [puzzleBoard[index1], puzzleBoard[index2]] = [puzzleBoard[index2], puzzleBoard[index1]];
        }
        
        function checkPuzzleWin() {
            // Verifica se todos os números estão em ordem
            for (let i = 0; i < 15; i++) {
                if (puzzleBoard[i] !== i + 1) return false;
            }
            return puzzleBoard[15] === null; // Última deve ser vazia
        }
        
        function updatePuzzleDisplay() {
            const timerElement = document.getElementById('timer-display');
            if (timerElement) {
                const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const secs = (timerSeconds % 60).toString().padStart(2, '0');
                timerElement.textContent = `${mins}:${secs}`;
            }
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // ============== GERENCIADOR DE JOGOS ==============
        function loadGame(game) {
            if (game === 'puzzle') {
                startPuzzle();
            } else if (game === 'quiz') {
                startQuiz();
            } else {
                gameContent.innerHTML = `
                    <h2>🎮 Super Arcade Kids</h2>
                    <p style="font-size: 1.3rem; margin-top: 20px; color: #7f8c8d;">
                        Escolha um jogo para começar!
                    </p>
                    <div style="margin-top: 40px; font-size: 1.1rem;">
                        <p>🧩 <strong>Puzzle 15</strong> - Organize os números na ordem correta</p>
                        <p>🧠 <strong>Quiz Educativo</strong> - 100+ perguntas diferentes a cada jogo</p>
                    </div>
                `;
            }
        }
        
        // Inicializa com menu
        loadGame('menu');
    </script>
</body>
</html>
