<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeLTA Games - Início</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #8e44ad, #3498db);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 3.5rem; text-shadow: 4px 4px 0 #333; color: #f1c40f; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        .game-card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            color: #2c3e50;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        
        .game-card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        
        .game-icon { font-size: 60px; margin-bottom: 15px; }
        .game-card h2 { margin-bottom: 10px; color: #8e44ad; font-size: 1.6rem; }
        .game-card p { font-size: 1.1rem; color: #7f8c8d; margin-bottom: 20px; flex-grow: 1; }
        
        .play-btn {
            background: #f1c40f;
            color: #d35400;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .game-card:hover .play-btn {
            background: #27ae60;
            color: white;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 BeLTA Games</h1>
        <p style="font-size: 1.5rem; margin-top: 10px;">Onde aprender é a maior diversão!</p>
    </div>
    
    <!-- Este container será preenchido automaticamente pelo JavaScript -->
    <div class="games-grid" id="games-container"></div>

    <script>
        // ==========================================================
        // CONFIGURAÇÃO DOS JOGOS (ADICIONE NOVOS JOGOS AQUI ABAIXO)
        // ==========================================================
        const meusJogos = [
            {
                titulo: "Quiz - Nível 10 Anos",
                descricao: "Teste seus conhecimentos em Matemática, Ciências, Português e muito mais!",
                icone: "🧠",
                link: "quiz.html"
            },
            {
                titulo: "Puzzle 15",
                descricao: "Desafio de raciocínio lógico! Organize os números o mais rápido possível.",
                icone: "🧩",
                link: "puzzle.html"
            },
            {
                titulo: "Mapa do Brasil",
                descricao: "Aprenda sobre os estados brasileiros montando este quebra-cabeça incrível!",
                icone: "🗺️",
                link: "mapa-brasil.html"
            },
            {
                titulo: "Memória das Capitais",
                descricao: "Você conhece os Estados e suas Capitais? Encontre os pares correspondentes!",
                icone: "🃏",
                link: "memoria.html"
            },
	    {
                titulo: "Desafio das Palavras",
                descricao: "Adivinhe palavras importantes da escola através de dicas super legais!",
                icone: "😵",
                link: "palavras.html"
            }
            // Para adicionar um novo jogo, basta copiar o bloco acima, 
            // colocar uma vírgula após a "}" e preencher os novos dados.
        ];

        // ==========================================================
        // FUNÇÃO PARA CRIAR OS CARDS NA TELA
        // ==========================================================
        function carregarJogos() {
            const container = document.getElementById('games-container');
            
            meusJogos.forEach(jogo => {
                const cardHtml = `
                    <a href="${jogo.link}" class="game-card">
                        <div>
                            <div class="game-icon">${jogo.icone}</div>
                            <h2>${jogo.titulo}</h2>
                            <p>${jogo.descricao}</p>
                        </div>
                        <span class="play-btn">Jogar Agora</span>
                    </a>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Executa a função ao carregar a página
        window.onload = carregarJogos;
    </script>
</body>
</html>
