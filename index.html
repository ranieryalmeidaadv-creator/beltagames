<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BeLTA Games - Portal</title>
    <style>
        /* (Seus estilos de gradiente e cards que já criamos) */
        body { font-family: 'Comic Sans MS', sans-serif; background: linear-gradient(135deg, #8e44ad, #3498db); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .header { text-align: center; padding: 20px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; padding: 20px; }
        .game-card { background: white; border-radius: 20px; padding: 20px; color: #333; text-decoration: none; text-align: center; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); }
        
        /* Modal de Nickname */
        #modal-nickname { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; color: #333; width: 300px; }
        input { padding: 10px; width: 100%; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; }
        
        /* Barra de Login */
        .auth-bar { background: rgba(255,255,255,0.1); width: 100%; padding: 10px 20px; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
        .user-pic { width: 35px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="auth-bar">
        <div id="user-logged" style="display: none;">
            <img id="user-pic" class="user-pic" src="">
            <span id="user-name"></span>
            <button onclick="logout()">Sair</button>
        </div>
        <button id="btn-login" onclick="loginGoogle()">Entrar com Google</button>
    </div>

    <div class="header">
        <h1>🎮 BeLTA Games</h1>
    </div>

    <div class="games-grid" id="games-container"></div>

    <!-- Modal Nickname -->
    <div id="modal-nickname">
        <div class="modal-content">
            <h2>Novo Herói!</h2>
            <p>Escolha seu Nickname único:</p>
            <input type="text" id="input-nickname" placeholder="Ex: SuperDino" maxlength="15">
            <button onclick="confirmarNick()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer;">Salvar e Começar</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script>
        const meusJogos = [
            { titulo: "Tabuada Ninja", link: "tabuada.html", icone: "🥷" },
            { titulo: "Mapa do Brasil", link: "mapa-brasil.html", icone: "🗺️" },
            { titulo: "Memória Capitais", link: "memoria.html", icone: "🃏" },
            { titulo: "Desafio Palavras", link: "palavras.html", icone: "🚀" },
            { titulo: "Puzzle 15", link: "puzzle.html", icone: "🧩" },
            { titulo: "Quiz Educativo", link: "quiz.html", icone: "🧠" }
        ];

        window.onload = () => {
            const container = document.getElementById('games-container');
            meusJogos.forEach(j => {
                container.innerHTML += `
                    <a href="${j.link}" class="game-card">
                        <div style="font-size: 40px">${j.icone}</div>
                        <h3>${j.titulo}</h3>
                    </a>`;
            });

            window.observarUsuario(async (user) => {
                const grid = document.getElementById('games-container');
                if (user) {
                    const perfil = await window.verificarOuCriarPerfil(user);
                    if (!perfil) {
                        document.getElementById('modal-nickname').style.display = 'flex';
                        grid.style.opacity = "0.2";
                    } else {
                        document.getElementById('user-name').textContent = perfil.nickname;
                        document.getElementById('user-pic').src = user.photoURL;
                        document.getElementById('user-logged').style.display = 'block';
                        document.getElementById('btn-login').style.display = 'none';
                        grid.style.opacity = "1";
                        grid.style.pointerEvents = "auto";
                    }
                } else {
                    document.getElementById('btn-login').style.display = 'block';
                    document.getElementById('user-logged').style.display = 'none';
                    grid.style.opacity = "0.2";
                    grid.style.pointerEvents = "none";
                }
            });
        };

        async function confirmarNick() {
            const nick = document.getElementById('input-nickname').value.trim();
            if (nick.length < 3) return alert("Nick muito curto!");
            await window.salvarNovoNickname(nick);
            location.reload();
        }
    </script>
</body>
</html>
