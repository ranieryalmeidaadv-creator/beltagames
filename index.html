<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BeLTA Games - Portal</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', sans-serif; 
            background: linear-gradient(135deg, #8e44ad, #3498db); 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .header { 
            text-align: center; 
            padding: 20px; 
        }
        .games-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            width: 90%; 
            max-width: 1000px; 
            padding: 20px; 
        }
        .game-card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            color: #333; 
            text-decoration: none; 
            text-align: center; 
            transition: 0.3s; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            opacity: 0.3;
            pointer-events: none;
        }
        .game-card.active { 
            opacity: 1;
            pointer-events: auto;
        }
        .game-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        
        /* Modal de Nickname */
        #modal-nickname { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95); 
            align-items: center; 
            justify-content: center; 
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            color: #333; 
            width: 90%; 
            max-width: 400px; 
        }
        input { 
            padding: 12px; 
            width: 100%; 
            margin: 15px 0; 
            border-radius: 10px; 
            border: 2px solid #ddd; 
            font-size: 16px;
        }
        
        /* Barra de Login */
        .auth-bar { 
            background: rgba(255,255,255,0.15); 
            width: 100%; 
            padding: 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 10px; 
            backdrop-filter: blur(5px);
        }
        .user-pic { 
            width: 35px; 
            height: 35px;
            border-radius: 50%; 
            border: 2px solid white;
        }
        .auth-buttons button {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #btn-login {
            background: #4285F4;
            color: white;
        }
        #btn-logout {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

   <div class="auth-bar">
    <div class="logo">
        <span style="font-size: 1.2em; font-weight: bold;">🎮 BeLTA Games</span>
    </div>
    
    <div class="nav-links" style="display: flex; align-items: center; gap: 15px;">
        <!-- Link para Ranking -->
        <a href="ranking.html" 
           style="color: white; text-decoration: none; font-weight: bold; 
                  background: rgba(255,255,255,0.2); padding: 8px 15px; 
                  border-radius: 20px; transition: 0.3s; display: flex; 
                  align-items: center; gap: 5px;"
           onmouseover="this.style.background='rgba(255,255,255,0.3)'"
           onmouseout="this.style.background='rgba(255,255,255,0.2)'">
           🏆 Ranking
        </a>
        
        <!-- Botões de autenticação -->
        <div class="auth-buttons">
            <div id="user-logged" style="display: none; align-items: center; gap: 10px;">
                <img id="user-pic" class="user-pic" src="" alt="Foto">
                <span id="user-name" style="font-weight: bold;"></span>
                <button id="btn-logout" onclick="logout()" style="padding: 5px 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">
                    Sair
                </button>
            </div>
            <button id="btn-login" onclick="loginGoogle()" style="padding: 8px 15px; background: #4285F4; color: white; border: none; border-radius: 20px; font-weight: bold; cursor: pointer;">
                Entrar com Google
            </button>
        </div>
    </div>
</div>

    <div class="header">
        <h1 style="font-size: 2.5em; margin: 20px 0 10px 0;">Portal de Jogos Educativos</h1>
        <p style="font-size: 1.1em;">Aprenda brincando com nossos jogos incríveis!</p>
    </div>

    <div class="games-grid" id="games-container"></div>

    <!-- Modal Nickname -->
    <div id="modal-nickname">
        <div class="modal-content">
            <h2 style="color: #8e44ad; margin-bottom: 10px;">🎉 Bem-vindo(a) ao BeLTA Games!</h2>
            <p>Escolha como quer ser chamado(a) nos rankings:</p>
            <p><small style="color: #666;">(Seu nickname não poderá ser alterado depois!)</small></p>
            <input type="text" id="input-nickname" placeholder="Ex: SuperDino, JogadorX, MathMaster" maxlength="15" autofocus>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button onclick="confirmarNick()" style="background: #27ae60; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold;">
                    Salvar e Jogar
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script>
        const meusJogos = [
            { titulo: "Tabuada Ninja", link: "tabuada.html", icone: "🥷", descricao: "Acerte as contas e corte os balões!" },
            { titulo: "Mapa do Brasil", link: "mapa-brasil.html", icone: "🗺️", descricao: "Aprenda os estados e capitais" },
            { titulo: "Memória Capitais", link: "memoria.html", icone: "🃏", descricao: "Encontre os pares estado-capital" },
            { titulo: "Desafio Palavras", link: "palavras.html", icone: "🚀", descricao: "Adivinhe palavras importantes" },
            { titulo: "Puzzle 15", link: "puzzle.html", icone: "🧩", descricao: "Ordene as peças numéricas" },
            { titulo: "Quiz Educativo", link: "quiz.html", icone: "🧠", descricao: "Teste seus conhecimentos" }
        ];

        // Carrega os jogos na tela
        function carregarJogos() {
            const container = document.getElementById('games-container');
            container.innerHTML = '';
            
            meusJogos.forEach(jogo => {
                const card = document.createElement('a');
                card.href = jogo.link;
                card.className = 'game-card'; // Inicialmente desabilitado
                card.innerHTML = `
                    <div style="font-size: 50px; margin-bottom: 10px;">${jogo.icone}</div>
                    <h3 style="margin: 10px 0; color: #2c3e50;">${jogo.titulo}</h3>
                    <p style="color: #7f8c8d; font-size: 0.9em;">${jogo.descricao}</p>
                `;
                container.appendChild(card);
            });
        }

        // Função de login - CRÍTICA: Recarrega a página após login
        async function loginGoogle() {
            console.log("🔄 Iniciando login...");
            try {
                const user = await window.loginGoogle();
                if (user) {
                    console.log("✅ Login realizado - recarregando página...");
                    // Força a recarga da página para atualizar o estado
                    setTimeout(() => location.reload(), 500);
                } else {
                    console.log("❌ Login falhou");
                }
            } catch (error) {
                console.error("❌ Erro no login:", error);
            }
        }

        // Função de logout
        async function logout() {
            await window.logout();
            location.reload();
        }

        // Função para salvar nickname
        async function confirmarNick() {
            const nickInput = document.getElementById('input-nickname');
            const nickname = nickInput.value.trim();
            
            if (nickname.length < 3) {
                alert("❌ O nickname precisa ter pelo menos 3 letras!");
                return;
            }
            
            const sucesso = await window.salvarNovoNickname(nickname);
            if (sucesso) {
                location.reload();
            }
        }

        // Inicialização
        window.onload = () => {
            carregarJogos();
            
            // Observa mudanças no login
            window.observarUsuario((estado) => {
                console.log("👁️ Estado do usuário:", estado);
                
                const btnLogin = document.getElementById('btn-login');
                const userLogged = document.getElementById('user-logged');
                const modalNick = document.getElementById('modal-nickname');
                const cards = document.querySelectorAll('.game-card');
                
                if (estado.autenticado) {
                    console.log("✅ Usuário autenticado:", estado.user?.email);
                    btnLogin.style.display = 'none';
                    
                    if (estado.isNovoUsuario) {
                        console.log("🆕 Novo usuário - mostrando modal de nickname");
                        modalNick.style.display = 'flex';
                        // Mantém os jogos desabilitados
                        cards.forEach(card => card.classList.remove('active'));
                    } else {
                        console.log("👤 Usuário já tem nickname:", estado.perfil?.nickname);
                        modalNick.style.display = 'none';
                        document.getElementById('user-name').textContent = estado.perfil.nickname;
                        document.getElementById('user-pic').src = estado.perfil.foto;
                        userLogged.style.display = 'flex';
                        
                        // Habilita os jogos
                        cards.forEach(card => card.classList.add('active'));
                    }
                } else {
                    console.log("❌ Usuário não autenticado");
                    btnLogin.style.display = 'block';
                    userLogged.style.display = 'none';
                    modalNick.style.display = 'none';
                    
                    // Desabilita os jogos
                    cards.forEach(card => card.classList.remove('active'));
                }
            });
        };
    </script>
</body>
</html>
